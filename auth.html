<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSIT Academy | Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #000000; --bg: #f9fafb; }
        body { font-family: 'Geist', sans-serif; background-color: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #eee; }
        .form-control { border-radius: 12px; padding: 0.75rem 1rem; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .form-control:focus { border-color: var(--accent); box-shadow: none; }
        .btn-auth { border-radius: 12px; padding: 0.8rem; font-weight: 600; transition: transform 0.2s; }
        .btn-auth:active { transform: scale(0.98); }
        .toggle-link { cursor: pointer; color: #6b7280; text-decoration: underline; font-size: 0.9rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="text-center mb-4">
        <div class="mb-3">
            <img src="it.jpeg" alt="Logo" width="64" height="64" 
                 class="rounded-3 shadow-sm object-fit-cover border">
        </div>
        
        <h3 class="fw-bold" id="auth-title">Welcome Back</h3>
        <p class="text-muted small" id="auth-subtitle">Login to access your CSS modules</p>
    </div>

    <form id="authForm">
        <div id="nameField" class="mb-3 hidden">
            <label class="form-label small fw-bold">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@smit.edu" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-dark w-100 btn-auth mb-3" id="submitBtn">Login</button>
        
        <div class="text-center">
            <span class="toggle-link" id="toggleAuth">Don't have an account? Register</span>
        </div>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNDPK069Uv_aBtUV5gTz5TlAXORwphLJcj-PwZmVNKwBw-B3JLCFlpefDKMWAXvGUn/exec"; // PASTE YOUR URL HERE
    let isLogin = true;

    const authForm = document.getElementById('authForm');
    const toggleBtn = document.getElementById('toggleAuth');
    const nameField = document.getElementById('nameField');
    const submitBtn = document.getElementById('submitBtn');
    const title = document.getElementById('auth-title');
    const subtitle = document.getElementById('auth-subtitle');

    toggleBtn.addEventListener('click', () => {
        isLogin = !isLogin;
        nameField.classList.toggle('hidden');
        title.innerText = isLogin ? "Welcome Back" : "Create Account";
        subtitle.innerText = isLogin ? "Login to access your CSS modules" : "Join the BSIT Academy today";
        submitBtn.innerText = isLogin ? "Login" : "Register";
        toggleBtn.innerText = isLogin ? "Don't have an account? Register" : "Already have an account? Login";
    });

    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = "Processing...";

        const payload = {
            action: isLogin ? 'login' : 'register',
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.text();

            if (result === "Success") {
                alert(isLogin ? "Login Successful!" : "Registration Successful! You can now login.");
                if (isLogin) window.location.href = "index.html";
                else location.reload();
            } else {
                alert("Error: " + result);
            }
        } catch (error) {
            alert("Connection error. Make sure your Script URL is correct.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = isLogin ? "Login" : "Register";
        }
    });
</script>

</body>
</html>
